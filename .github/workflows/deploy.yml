name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SF_INSTANCE_URL: ${{ secrets.VITE_SF_INSTANCE_URL }}
          VITE_SF_LOGIN_URL: ${{ secrets.VITE_SF_LOGIN_URL }}
          VITE_SF_CLIENT_ID: ${{ secrets.VITE_SF_CLIENT_ID }}
          VITE_SF_API_VERSION: ${{ secrets.VITE_SF_API_VERSION }}
          VITE_DEMO_ACCOUNT_ID: ${{ secrets.VITE_DEMO_ACCOUNT_ID }}
          VITE_AGENTFORCE_AGENT_ID: ${{ secrets.VITE_AGENTFORCE_AGENT_ID }}
          VITE_AGENTFORCE_AGENT_NAME: ${{ secrets.VITE_AGENTFORCE_AGENT_NAME }}
          VITE_MCP_PROXY_BASE: ${{ secrets.VITE_MCP_PROXY_BASE }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
